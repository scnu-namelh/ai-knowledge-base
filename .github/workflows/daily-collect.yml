name: Daily Collect

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run pipeline
        run: python pipeline/pipeline.py --sources github,rss --limit 20 --verbose
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Validate articles
        run: |
          python hooks/validate_json.py knowledge/articles/*.json
          python hooks/check_quality.py knowledge/articles/*.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No new data, skipping commit"
            exit 0
          fi
          ARTICLE_COUNT=$(ls -1 knowledge/articles/*.json 2>/dev/null | wc -l)
          git commit -m "chore: daily collect $(date +%Y%m%d) ($ARTICLE_COUNT articles)"
          git push
